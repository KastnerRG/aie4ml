# Create with `./create_conda_env.sh` or `PYTHONNOUSERSITE=1 conda env create -f environment.aie4ml.yml`
# so conda's pip phase does not resolve packages from ~/.local into this environment.
name: aie4ml
channels:
  - conda-forge
variables:
  PYTHONNOUSERSITE: "1"
dependencies:
  - python=3.10
  - pip
  - jupyterlab
  - notebook
  - ipykernel
  - numpy
  - jinja2
  - binutils
  - elfutils
  - pyparsing
  - pip:
      - tensorflow==2.15.1
      - tf_keras==2.15.0
      - keras==2.15.0
      - absl-py~=1.4.0
      - tensorflow-model-optimization==0.7.5
      - qkeras==0.9.0
      - git+https://github.com/fastmachinelearning/hls4ml.git@main
      - -e .
